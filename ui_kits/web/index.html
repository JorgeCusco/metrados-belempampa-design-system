<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1280,initial-scale=1" />
  <title>Metrados Belempampa — UI Kit</title>
  <link rel="stylesheet" href="../../colors_and_type.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    body { font-family: "Inter", ui-sans-serif, system-ui, -apple-system, sans-serif; background: #f8fafc; }
    html, body, #root { height: 100%; }
  </style>
</head>
<body>
  <div id="root" data-screen-label="Metrados Belempampa — Main App"></div>

  <script type="text/babel" src="./Primitives.jsx"></script>
  <script type="text/babel" src="./Header.jsx"></script>
  <script type="text/babel" src="./MetradosForm.jsx"></script>
  <script type="text/babel" src="./MetradosTable.jsx"></script>
  <script type="text/babel">
    const { useState } = React;

    // Seed rows so the table shows off on first load
    const seedRows = [
      { partida: { id: "01.01.01", codigo: "01.01.01", descripcion: "CONCRETO EN COLUMNAS F'c=210 kg/cm2", unidad: "m3", modificacion: null, isAcero: false },
        detalle: "C-1", ubicacion: "S1 / N1 / Eje A / Eje 2", total: "2.40" },
      { partida: { id: "01.01.01", codigo: "01.01.01", descripcion: "CONCRETO EN COLUMNAS F'c=210 kg/cm2", unidad: "m3", modificacion: null, isAcero: false },
        detalle: "C-2", ubicacion: "S1 / N1 / Eje B / Eje 2", total: "2.40" },
      { partida: { id: "01.01.02", codigo: "01.01.02", descripcion: "ACERO DE REFUERZO Fy=4200 kg/cm2 EN COLUMNAS", unidad: "kg", modificacion: "DD", isAcero: true },
        detalle: "Φ 1/2\" longitudinal", ubicacion: "S1 / N1 / Eje A", total: "42.60" },
      { partida: { id: "01.01.02", codigo: "01.01.02", descripcion: "ACERO DE REFUERZO Fy=4200 kg/cm2 EN COLUMNAS", unidad: "kg", modificacion: "DD", isAcero: true },
        detalle: "Φ 3/8\" estribos", ubicacion: "S1 / N1 / Eje A", total: "12.85" },
      { partida: { id: "01.02.01", codigo: "01.02.01", descripcion: "CONCRETO EN VIGAS F'c=210 kg/cm2", unidad: "m3", modificacion: "PN", isAcero: false },
        detalle: "V-101", ubicacion: "S1 / N1 / Eje 1", total: "1.80" },
    ];

    function App() {
      const [proyecto, setProyecto] = useState("hospital");
      const [selectedPartida, setSelectedPartida] = useState(null);
      const [rows, setRows] = useState(seedRows);
      const [toast, setToast] = useState(null);

      const showToast = (msg, variant = "success") => {
        setToast({ msg, variant });
        setTimeout(() => setToast(null), 2600);
      };

      const totalGeneral = rows.reduce((s, r) => s + parseFloat(r.total), 0).toFixed(2);

      return (
        <div className="min-h-full p-6">
          <div className="max-w-[1240px] mx-auto flex flex-col gap-5">
            <Header proyecto={proyecto} onProyectoChange={setProyecto} />

            <div className="grid grid-cols-[420px_1fr] gap-5 min-h-[720px]">
              <MetradosForm proyecto={proyecto} selectedPartida={selectedPartida} onSelectPartida={setSelectedPartida}
                onAdd={r => setRows(rs => [...rs, r])} onToast={showToast} />
              <MetradosTable proyecto={proyecto} rows={rows} onDelete={i => setRows(rs => rs.filter((_, idx) => idx !== i))}
                onExport={() => showToast("Exportando a Excel…", "success")} totalGeneral={totalGeneral} />
            </div>

            {/* Footer partida info pill */}
            {selectedPartida && (
              <div className="fixed bottom-5 left-5 bg-white/95 backdrop-blur border border-slate-200 rounded-2xl px-4 py-3 shadow-xl flex items-center gap-3" style={{ boxShadow: "0 20px 25px -5px rgba(0,0,0,0.08)" }}>
                <ModDot mod={selectedPartida.modificacion} />
                <div className="flex flex-col">
                  <span className="text-[9px] font-black uppercase tracking-wider text-slate-400">Partida seleccionada</span>
                  <span className="text-xs font-black text-slate-700">{selectedPartida.codigo} · {selectedPartida.descripcion.slice(0, 60)}</span>
                </div>
              </div>
            )}

            {/* Toast */}
            {toast && (
              <div className="fixed top-6 right-6 bg-white/95 backdrop-blur-md border border-slate-200 rounded-2xl shadow-2xl px-4 py-3 flex items-center gap-3 animate-[slideIn_.3s_ease]" style={{ boxShadow: "0 25px 50px -12px rgba(0,0,0,0.15)" }}>
                <div className={`w-2.5 h-2.5 rounded-full ${toast.variant === "error" ? "bg-red-500" : toast.variant === "info" ? "bg-blue-500" : "bg-emerald-500"}`} />
                <span className="text-xs font-bold text-slate-700">{toast.msg}</span>
              </div>
            )}
          </div>

          {/* Fixed footer tag */}
          <div className="fixed bottom-5 right-5 text-[9px] font-black uppercase tracking-widest text-slate-300">v0.3.0 · Metrados Belempampa</div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
