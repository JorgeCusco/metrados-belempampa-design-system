<!doctype html><html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>html,body{margin:0;background:#f3f4f6}
.card{padding:20px 24px;font-family:var(--font-sans);display:flex;gap:14px;align-items:center;flex-wrap:wrap}
.toast{display:inline-flex;align-items:center;gap:8px;background:#22c55e;color:#fff;padding:12px 16px;border-radius:8px;box-shadow:0 20px 25px -5px rgba(0,0,0,.15);font-weight:600;font-size:13px}
.pill{background:rgba(239,246,255,.6);border:1px solid #dbeafe;padding:8px 14px;border-radius:12px;display:inline-flex;align-items:center;gap:14px;font-size:11px;font-family:var(--font-mono);font-weight:900;color:#1d4ed8}
.dim{color:#60a5fa;opacity:.5;margin-right:4px}
.sep{opacity:.2;margin:0 12px}
.dot{width:10px;height:10px;border-radius:50%;border:1px solid #2563eb;background:#3b82f6}
.foot{background:#1e293b;color:#fff;padding:6px 12px;border-radius:6px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:-0.02em}
</style></head><body>
<div class="card">
  <span class="toast">✨ Metrado guardado: OE.2.3.9.1</span>
  <span class="pill"><span><span class="dim">ID:</span>OE.2.3.9.1</span><span class="sep">|</span><span><span class="dim">UNIDAD:</span>m³</span><span class="dot"></span></span>
  <span class="foot">Control de Planilla Web v3.0</span>
</div></body></html>
