<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;padding:0;background:#f3f4f6}
  .card{padding:20px 24px;font-family:var(--font-sans)}
  .row{display:flex;gap:12px;align-items:center;margin:0 0 10px;flex-wrap:wrap}
  .name{font-size:12px;font-weight:800;color:var(--slate-700);min-width:120px}
  .sw{width:44px;height:44px;border-radius:10px;border:1px solid rgba(0,0,0,.06);box-shadow:inset 0 0 0 1px rgba(255,255,255,.4)}
  .hex{font-family:var(--font-mono);font-size:11px;color:var(--slate-500);font-weight:700}
  .tok{font-size:10px;color:var(--slate-400);font-weight:900;text-transform:uppercase;letter-spacing:.08em}
</style>
</head>
<body>
<div class="card">
  <div class="row"><div class="sw" style="background:#0084ff"></div><div class="name">primary</div><div class="hex">#0084ff</div><div class="tok">--color-primary</div></div>
  <div class="row"><div class="sw" style="background:#006bce"></div><div class="name">primary-hover</div><div class="hex">#006bce</div><div class="tok">--color-primary-hover</div></div>
  <div class="row"><div class="sw" style="background:#2563eb"></div><div class="name">blue-600 (Hospital)</div><div class="hex">#2563eb</div><div class="tok">--blue-600</div></div>
  <div class="row"><div class="sw" style="background:#1e3a8a"></div><div class="name">blue-900 (totals)</div><div class="hex">#1e3a8a</div><div class="tok">--fg-total</div></div>
  <div class="row"><div class="sw" style="background:#d97706"></div><div class="name">amber-600 (Contingencia)</div><div class="hex">#d97706</div><div class="tok">--amber-600</div></div>
</div>
</body></html>
