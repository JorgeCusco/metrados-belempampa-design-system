<!doctype html><html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>html,body{margin:0;background:#f3f4f6;font-family:var(--font-sans)}
.card{padding:20px 28px}
.row{display:flex;align-items:center;gap:14px;margin:8px 0}
.label{font-size:10px;color:var(--slate-400);font-weight:900;text-transform:uppercase;letter-spacing:.08em;min-width:88px}
.spec{font-weight:900;text-transform:uppercase;color:var(--slate-500);letter-spacing:0.1em}
.tight{letter-spacing:-0.02em;text-align:center}
</style></head><body>
<div class="card">
  <div class="row"><span class="label">11px · 700</span><span style="font-size:11px;font-weight:700;color:var(--slate-700)">2,485.30 m³ — concreto vigas</span></div>
  <div class="row"><span class="label">10px · 900</span><span class="spec" style="font-size:10px">Especialidad (filtro OE)</span></div>
  <div class="row"><span class="label">9px · 900</span><span class="spec tight" style="font-size:9px">cantidad · largo · ancho · alto · veces</span></div>
  <div class="row"><span class="label">8px · 900</span><span class="spec" style="font-size:8px">Parcial</span></div>
  <div class="row"><span class="label">7px · 900</span><span class="spec tight" style="font-size:7px">long(r) / alto(g)</span></div>
</div></body></html>
