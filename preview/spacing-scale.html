<!doctype html><html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>html,body{margin:0;background:#f3f4f6}
.card{padding:20px 24px;font-family:var(--font-sans)}
.row{display:flex;align-items:center;gap:14px;margin:10px 0}
.lbl{font-size:10px;color:var(--slate-400);font-weight:900;text-transform:uppercase;letter-spacing:.08em;min-width:80px}
.box{background:#fff;border:1px dashed #cbd5e1;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:10px;color:#94a3b8}
</style></head><body>
<div class="card">
  <div class="row"><span class="lbl">4px</span><div class="box" style="width:4px;height:20px"></div><span class="mono" style="font-size:10px;color:#64748b">gap-1 · inline dots</span></div>
  <div class="row"><span class="lbl">6px</span><div class="box" style="width:6px;height:20px"></div><span class="mono" style="font-size:10px;color:#64748b">gap-1.5 · math cells</span></div>
  <div class="row"><span class="lbl">8px</span><div class="box" style="width:8px;height:20px"></div><span class="mono" style="font-size:10px;color:#64748b">gap-2 · inline icons</span></div>
  <div class="row"><span class="lbl">12px</span><div class="box" style="width:12px;height:20px"></div><span class="mono" style="font-size:10px;color:#64748b">gap-3 · form stack</span></div>
  <div class="row"><span class="lbl">16px</span><div class="box" style="width:16px;height:20px"></div><span class="mono" style="font-size:10px;color:#64748b">p-4 · card interior</span></div>
  <div class="row"><span class="lbl">24px</span><div class="box" style="width:24px;height:20px"></div><span class="mono" style="font-size:10px;color:#64748b">gap-6 · main layout grid</span></div>
</div></body></html>
