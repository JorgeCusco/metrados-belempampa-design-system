<!doctype html><html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>html,body{margin:0;background:#f3f4f6}
.card{padding:24px;font-family:var(--font-sans);display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.el{background:#fff;border-radius:12px;padding:16px 12px;text-align:center}
.lb{font-size:9px;font-weight:900;color:#475569;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.hx{font-family:var(--font-mono);font-size:9px;color:#94a3b8;font-weight:700;margin-top:10px}
.sw{width:56px;height:24px;margin:0 auto;background:#fff;border-radius:8px}
.s-sm{box-shadow:0 1px 2px 0 rgba(0,0,0,.05)}
.s-md{box-shadow:0 4px 6px -1px rgba(0,0,0,.08), 0 2px 4px -2px rgba(0,0,0,.05)}
.s-lg{box-shadow:0 10px 15px -3px rgba(0,0,0,.08), 0 4px 6px -4px rgba(0,0,0,.05)}
.s-xl{box-shadow:0 20px 25px -5px rgba(0,0,0,.08), 0 8px 10px -6px rgba(0,0,0,.05)}
.s-glass{box-shadow:0 8px 32px 0 rgba(31,38,135,.15)}
.s-primary{background:#0084ff;box-shadow:0 10px 15px -3px rgba(0,132,255,.35)}
.s-inner{background:#f1f5f9;box-shadow:inset 0 2px 4px 0 rgba(0,0,0,.05)}
</style></head><body>
<div class="card">
  <div class="el"><div class="lb">sm</div><div class="sw s-sm"></div><div class="hx">default cards</div></div>
  <div class="el"><div class="lb">md</div><div class="sw s-md"></div><div class="hx">focus · inputs</div></div>
  <div class="el"><div class="lb">lg</div><div class="sw s-lg"></div><div class="hx">toast · hover</div></div>
  <div class="el"><div class="lb">xl</div><div class="sw s-xl"></div><div class="hx">dropdowns</div></div>
  <div class="el"><div class="lb">glass</div><div class="sw s-glass"></div><div class="hx">glass-panel</div></div>
  <div class="el"><div class="lb">primary glow</div><div class="sw s-primary"></div><div class="hx">brand chip</div></div>
  <div class="el"><div class="lb">inner</div><div class="sw s-inner"></div><div class="hx">project toggle</div></div>
</div></body></html>
