<!doctype html><html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>html,body{margin:0;background:#f3f4f6}
.card{padding:22px;font-family:var(--font-sans)}
.toggle{display:inline-flex;gap:4px;background:#f1f5f9;padding:4px;border-radius:12px;border:1px solid #e2e8f0;box-shadow:inset 0 2px 4px 0 rgba(0,0,0,.05)}
.tab{display:inline-flex;align-items:center;gap:8px;padding:8px 16px;border-radius:8px;font-size:12px;font-weight:800}
.tab.on-h{background:#fff;color:#1d4ed8;box-shadow:0 4px 6px -1px rgba(0,0,0,.08);border:1px solid #dbeafe}
.tab.on-c{background:#fff;color:#d97706;box-shadow:0 4px 6px -1px rgba(0,0,0,.08);border:1px solid #fef3c7}
.tab.off{color:#64748b}
.ic{width:14px;height:14px;display:inline-block;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;fill:none}
.lbl{font-size:9px;font-weight:900;color:#94a3b8;text-transform:uppercase;letter-spacing:.08em;margin:14px 4px 6px}
</style></head><body>
<div class="card">
  <div class="lbl">Project toggle — Hospital active</div>
  <div class="toggle">
    <div class="tab on-h"><svg viewBox="0 0 24 24" class="ic"><path d="M4.8 2.3A.3.3 0 1 0 5 2H4a2 2 0 0 0-2 2v5a6 6 0 0 0 6 6v0a6 6 0 0 0 6-6V4a2 2 0 0 0-2-2h-1a.2.2 0 1 0 .3.3"/><path d="M8 15v1a6 6 0 0 0 6 6v0a6 6 0 0 0 6-6v-4"/><circle cx="20" cy="10" r="2"/></svg>Hospital</div>
    <div class="tab off"><svg viewBox="0 0 24 24" class="ic"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>Contingencia</div>
  </div>
  <div class="lbl" style="margin-top:18px">Contingencia active</div>
  <div class="toggle">
    <div class="tab off"><svg viewBox="0 0 24 24" class="ic"><path d="M4.8 2.3A.3.3 0 1 0 5 2H4a2 2 0 0 0-2 2v5a6 6 0 0 0 6 6v0a6 6 0 0 0 6-6V4a2 2 0 0 0-2-2h-1a.2.2 0 1 0 .3.3"/><path d="M8 15v1a6 6 0 0 0 6 6v0a6 6 0 0 0 6-6v-4"/><circle cx="20" cy="10" r="2"/></svg>Hospital</div>
    <div class="tab on-c"><svg viewBox="0 0 24 24" class="ic"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>Contingencia</div>
  </div>
</div></body></html>
