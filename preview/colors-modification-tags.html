<!doctype html><html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:#f3f4f6}
  .card{padding:18px 24px}
  .row{display:flex;gap:10px;align-items:center;margin:10px 0}
  .dot{width:12px;height:12px;border-radius:50%;border:1px solid}
  .tag{font-family:var(--font-mono);font-size:11px;font-weight:900;min-width:28px;color:var(--slate-700)}
  .desc{font-size:11px;color:var(--slate-500);font-weight:600}
</style></head><body>
<div class="card">
  <div class="row"><span class="dot" style="background:#bae6fd;border-color:#7dd3fc"></span><span class="tag">·</span><span class="desc">Sin modificación (default)</span></div>
  <div class="row"><span class="dot" style="background:#ef4444;border-color:#dc2626"></span><span class="tag">DD</span><span class="desc">Deductivo</span></div>
  <div class="row"><span class="dot" style="background:#22c55e;border-color:#16a34a"></span><span class="tag">PN</span><span class="desc">Partida nueva</span></div>
  <div class="row"><span class="dot" style="background:#3b82f6;border-color:#2563eb"></span><span class="tag">MM</span><span class="desc">Modificación de metrado</span></div>
  <div class="row"><span class="dot" style="background:#FF69B4;border-color:#FF1493"></span><span class="tag">PC</span><span class="desc">Partidas creadas (custom)</span></div>
</div></body></html>
