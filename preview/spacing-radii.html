<!doctype html><html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>html,body{margin:0;background:#f3f4f6}
.card{padding:20px 24px;font-family:var(--font-sans);display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.d{background:#fff;border:1px solid #e2e8f0;padding:10px 12px;display:flex;flex-direction:column;align-items:center;gap:6px}
.sq{width:48px;height:48px;background:#dbeafe;border:1px solid #60a5fa}
.nm{font-size:10px;font-weight:900;color:#475569;text-transform:uppercase;letter-spacing:.08em}
.hx{font-family:var(--font-mono);font-size:9px;color:#94a3b8;font-weight:700}
</style></head><body>
<div class="card">
  <div class="d"><div class="sq" style="border-radius:4px"></div><div class="nm">rounded</div><div class="hx">4px · grid cells</div></div>
  <div class="d"><div class="sq" style="border-radius:6px"></div><div class="nm">md</div><div class="hx">6px · footer tag</div></div>
  <div class="d"><div class="sq" style="border-radius:8px"></div><div class="nm">lg</div><div class="hx">8px · chips</div></div>
  <div class="d"><div class="sq" style="border-radius:12px"></div><div class="nm">xl</div><div class="hx">12px · inputs, btns</div></div>
  <div class="d"><div class="sq" style="border-radius:16px"></div><div class="nm">2xl</div><div class="hx">16px · cards</div></div>
  <div class="d"><div class="sq" style="border-radius:9999px"></div><div class="nm">full</div><div class="hx">dots, section bar</div></div>
</div></body></html>
