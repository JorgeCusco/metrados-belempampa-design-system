<!doctype html><html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>html,body{margin:0;background:#f3f4f6}
.card{padding:16px;font-family:var(--font-sans)}
table{width:100%;border-collapse:collapse;font-size:11px;background:#fff;border:1px solid #e2e8f0;border-radius:8px;overflow:hidden}
th{text-align:left;padding:8px 10px;font-size:10px;font-weight:800;color:#94a3b8;text-transform:uppercase;background:#fff;border-bottom:1px solid #f1f5f9}
td{padding:6px 10px;border-bottom:1px solid #f1f5f9;color:#334155}
tr.title td{background:#1e293b;color:#fff;font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.1em;font-family:var(--font-mono)}
tr.partida td{background:rgba(239,246,255,.8);font-weight:700}
tr.partida .code{font-family:var(--font-mono);font-size:10px;color:#2563eb;background:rgba(219,234,254,.5);padding:2px 4px;border-radius:4px}
tr.virt td{background:rgba(248,250,252,.5);color:#475569;font-weight:700;font-size:11px;text-transform:uppercase}
.arrow{color:#60a5fa;font-weight:900}
.total{font-weight:900;color:#1d4ed8}
.mono{font-family:var(--font-mono)}
.dot{display:inline-block;width:10px;height:10px;border-radius:50%;border:1px solid;vertical-align:middle;margin-right:4px}
</style></head><body>
<div class="card">
<table>
  <thead><tr><th style="width:90px">Código</th><th>Descripción</th><th style="width:40px;text-align:center">Und</th><th style="text-align:right;width:80px">Total</th></tr></thead>
  <tbody>
    <tr class="title"><td>OE.2</td><td colspan="3">OE.2 ESTRUCTURAS</td></tr>
    <tr class="partida"><td><span class="code">OE.2.3.9.1</span></td><td><span class="dot" style="background:#3b82f6;border-color:#2563eb"></span>Concreto en vigas f'c=210 kg/cm²</td><td style="text-align:center;font-weight:700;color:#64748b">m³</td><td class="total" style="text-align:right">450.50</td></tr>
    <tr class="virt"><td></td><td colspan="3"><span class="arrow">▼</span> VIGA BV-206 EJES 1-4</td></tr>
    <tr><td class="mono" style="font-size:9px;color:#475569">F1 · I · N2</td><td><span class="arrow">↳</span> Concreto longitudinal</td><td></td><td class="mono" style="text-align:right;font-weight:700">12.45</td></tr>
    <tr><td class="mono" style="font-size:9px;color:#475569">F1 · I · N2</td><td><span class="arrow">↳</span> Paños 3-5</td><td></td><td class="mono" style="text-align:right;font-weight:700">8.20</td></tr>
  </tbody>
</table>
</div></body></html>
