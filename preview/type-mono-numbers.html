<!doctype html><html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>html,body{margin:0;background:#f3f4f6}
.card{padding:20px 24px;font-family:var(--font-sans)}
.row{display:flex;align-items:center;gap:14px;margin:10px 0}
.lbl{font-size:10px;color:var(--slate-400);font-weight:900;text-transform:uppercase;letter-spacing:.08em;min-width:110px}
</style></head><body>
<div class="card">
  <div class="row"><span class="lbl">wbs code</span><span class="wbs-code">OE.2.3.9.1</span><span class="wbs-code">OE.1.1</span><span class="wbs-code">OE.5.6.2</span></div>
  <div class="row"><span class="lbl">total / hero</span><span class="num-total" style="font-size:20px">1,245.50</span><span class="num-total" style="font-size:14px">32,480.00</span></div>
  <div class="row"><span class="lbl">grid num</span><span class="mono" style="font-size:11px;color:var(--slate-700)">2.45</span><span class="mono" style="font-size:11px;color:var(--slate-700)">0.30</span><span class="mono" style="font-size:11px;color:var(--slate-500);font-weight:600">4.20</span></div>
  <div class="row"><span class="lbl">diameter pill</span><span style="font-family:var(--font-mono);font-size:10px;font-weight:700;color:#ea580c;background:rgba(255,237,213,0.8);padding:3px 8px;border-radius:4px;border:1px solid #fed7aa">Φ 5/8"</span></div>
</div></body></html>
