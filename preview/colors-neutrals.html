<!doctype html><html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:#f3f4f6}
  .card{padding:20px 24px}
  .ramp{display:grid;grid-template-columns:repeat(10,1fr);gap:4px}
  .chip{aspect-ratio:1/1;border-radius:6px;display:flex;align-items:flex-end;padding:4px;font-family:var(--font-mono);font-size:9px;font-weight:800}
  .lbl{font-size:10px;font-weight:900;color:var(--slate-500);text-transform:uppercase;letter-spacing:.08em;margin:8px 2px 6px}
</style></head><body>
<div class="card">
<div class="lbl">Slate (neutrals)</div>
<div class="ramp">
  <div class="chip" style="background:#f8fafc;color:#64748b">50</div>
  <div class="chip" style="background:#f1f5f9;color:#64748b">100</div>
  <div class="chip" style="background:#e2e8f0;color:#475569">200</div>
  <div class="chip" style="background:#cbd5e1;color:#334155">300</div>
  <div class="chip" style="background:#94a3b8;color:#fff">400</div>
  <div class="chip" style="background:#64748b;color:#fff">500</div>
  <div class="chip" style="background:#475569;color:#fff">600</div>
  <div class="chip" style="background:#334155;color:#fff">700</div>
  <div class="chip" style="background:#1e293b;color:#fff">800</div>
  <div class="chip" style="background:#0f172a;color:#fff">900</div>
</div>
</div></body></html>
